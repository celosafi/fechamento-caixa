<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fechamento de Caixa</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
<style>
:root{--azul:#1a3a5c;--verde:#2e7d32;--vermelho:#c62828;--amarelo:#fffde7;--lilas:#f3e8ff;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Segoe UI,sans-serif;background:#f2f4f7;color:#222;font-size:15px}
.topo{background:var(--azul);color:white;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
.topo h1{font-size:19px}
.topo input{padding:8px;border-radius:8px;border:1px solid #ffffff55;background:#ffffff22;color:white;width:110px}
.topo input::placeholder{color:#ffffffaa}
.nav{display:flex;background:white;border-bottom:1px solid #ddd;position:sticky;top:52px;z-index:9}
.nav button{flex:1;padding:13px;border:0;background:white;font-weight:bold;color:#555;cursor:pointer}
.nav button.on{color:var(--azul);border-bottom:3px solid var(--azul)}
.pnl{display:none;max-width:780px;margin:auto;padding:15px}
.pnl.on{display:block}
.card{background:white;border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px #0001}
.info{background:#e3f2fd;color:#1565c0;border-radius:10px;padding:12px;margin-bottom:12px;line-height:1.5}
.grade{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px}
.cxbtn{padding:10px 4px;border:1px solid #ccc;border-radius:9px;background:white;cursor:pointer;font-weight:bold}
.cxbtn.ok{background:#e8f5e9;color:var(--verde);border-color:#4caf50}
.cxbtn.on{border:3px solid var(--azul)}
.cxbtn.vol{background:var(--lilas);border-color:#a78bfa}
.cxbtn.vol.ok{background:#d8b4fe;color:#4c1d95}
.cfg{display:grid;grid-template-columns:70px 1fr 100px 1fr;gap:8px;align-items:center;border-bottom:1px solid #eee;padding:8px 0}
.cfg input,.cfg select,.lf input{padding:10px;border:1px solid #ccc;border-radius:8px;font-size:15px}
.lf{display:grid;grid-template-columns:1fr 150px;gap:10px;align-items:center;margin:8px 0}
.lf label{font-weight:600;color:#444}
.lf input{text-align:right;font-size:18px;font-weight:bold}
.lf input.fisico{background:var(--amarelo);border-color:#f9a825}
.titulo{font-size:18px;font-weight:bold;color:var(--azul);margin-bottom:12px;border-bottom:1px solid #eee;padding-bottom:8px}
.sub{font-size:12px;text-transform:uppercase;color:#777;font-weight:bold;margin:16px 0 8px}
.btn{width:100%;padding:14px;border:0;border-radius:10px;background:var(--azul);color:white;font-weight:bold;font-size:16px;cursor:pointer;margin-top:10px}
.btn2{padding:11px 14px;border:0;border-radius:9px;background:#1a5c2e;color:white;font-weight:bold;cursor:pointer}
.btn3{padding:11px 14px;border:1px solid #ccc;border-radius:9px;background:white;font-weight:bold;cursor:pointer}
.zona{border:2px dashed #bbb;border-radius:12px;padding:18px;text-align:center;background:#fafafa;cursor:pointer;margin-bottom:12px}
.result{background:#f8fafc;border-radius:10px;padding:12px;margin-top:12px}
.result .linha{display:flex;justify-content:space-between;padding:6px 0}
.result .total{font-size:20px;font-weight:bold}
.verde{color:var(--verde)!important}
.vermelho{color:var(--vermelho)!important}
.tblwrap{overflow-x:auto;background:white;border-radius:12px}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:8px;border-bottom:1px solid #eee;text-align:right;white-space:nowrap}
th{background:#1a3a5c;color:white}
td:first-child,th:first-child,td:nth-child(2),th:nth-child(2){text-align:left}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:12px}
.mcard{background:white;border-radius:10px;padding:12px;border:1px solid #ddd}
.mcard .lb{font-size:12px;color:#666;font-weight:bold;text-transform:uppercase}
.mcard .vl{font-size:19px;font-weight:bold;margin-top:5px}
@media(max-width:700px){
.grade{grid-template-columns:repeat(4,1fr)}
.cfg{grid-template-columns:1fr}
.lf{grid-template-columns:1fr}
.cards{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="topo">
<h1>📋 Fechamento de Caixa</h1>
<div>
<input id="inp-data" placeholder="Data">
<input id="inp-evento" placeholder="Evento">
</div>
</div>

<div class="nav">
<button class="on" onclick="aba('config')">⚙️ Config</button>
<button onclick="aba('lancamento')">📷 Lançamento</button>
<button onclick="aba('consolidado')">📊 Consolidado</button>
</div>

<div id="pnl-config" class="pnl on">
<div class="info">Configure os caixas. Caixas 25 a 40 são volantes e trabalham somente com eletrônico.</div>
<div class="card">
<button class="btn3" onclick="bulkTipo('D')">CX 1-24 Dinheiro + Cartão</button>
<button class="btn3" onclick="bulkTipo('C')">CX 1-24 Somente Cartão</button>
<div style="margin-top:10px;display:flex;gap:8px">
<input id="inp-bulk-troco" type="number" placeholder="Troco padrão" style="flex:1;padding:11px;border-radius:8px;border:1px solid #ccc">
<button class="btn2" onclick="bulkTroco()">Aplicar Troco</button>
</div>
</div>
<div class="card" id="lista-cfg"></div>
<button class="btn" onclick="aba('lancamento')">Ir para lançamento</button>
<button class="btn" style="background:#c62828" onclick="novoEvento()">Apagar evento</button>
</div>

<div id="pnl-lancamento" class="pnl">
<div class="grade" id="grade"></div>
<div id="form-cx"><div class="card">Selecione um caixa.</div></div>
</div>

<div id="pnl-consolidado" class="pnl">
<div id="cards" class="cards"></div>
<div style="display:flex;gap:8px;margin-bottom:10px">
<button class="btn2" onclick="expXLSX()">📥 Exportar XLSX Corrigido</button>
<button class="btn3" onclick="expCSV()">CSV</button>
</div>
<div class="tblwrap"><table id="tbl"></table></div>
</div>

<input type="file" id="fi" accept="image/*" capture="environment" style="display:none">

<script>
const TOTAL_CX=40;
const VOLANTE_START=24;
const LS_KEY='fechamento_corrigido_v1';

const ST={
caixas:Array.from({length:TOTAL_CX},(_,i)=>({
num:i+1,
tipo:i>=VOLANTE_START?'V':'D',
troco:0,
nome:'',
dados:null
}))
};

let atv=null;

const fmt=v=>'R$ '+Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const nv=id=>{
const el=document.getElementById(id);
return el&&el.value!==''?parseFloat(el.value)||0:0;
};

function salvarLocal(){
localStorage.setItem(LS_KEY,JSON.stringify({
caixas:ST.caixas,
data:document.getElementById('inp-data').value,
evento:document.getElementById('inp-evento').value
}));
}

function restaurarLocal(){
try{
const raw=localStorage.getItem(LS_KEY);
if(!raw)return;
const s=JSON.parse(raw);
if(s.caixas&&s.caixas.length===TOTAL_CX){
s.caixas.forEach((c,i)=>Object.assign(ST.caixas[i],c));
document.getElementById('inp-data').value=s.data||'';
document.getElementById('inp-evento').value=s.evento||'';
}
}catch(e){}
}

function aba(id){
document.querySelectorAll('.nav button').forEach((b,i)=>b.classList.toggle('on',['config','lancamento','consolidado'][i]===id));
document.querySelectorAll('.pnl').forEach(p=>p.classList.remove('on'));
document.getElementById('pnl-'+id).classList.add('on');
if(id==='config')renderCfg();
if(id==='lancamento')renderGrade();
if(id==='consolidado')renderCons();
salvarLocal();
}

function renderCfg(){
document.getElementById('lista-cfg').innerHTML=ST.caixas.map((cx,i)=>{
const vol=cx.tipo==='V';
return `
<div class="cfg">
<b>${vol?'CV':'CX'} ${cx.num}</b>
${vol?'<span>Volante - somente eletrônico</span>':`
<select onchange="ST.caixas[${i}].tipo=this.value;renderCfg();salvarLocal()">
<option value="D" ${cx.tipo==='D'?'selected':''}>Dinheiro + Cartão</option>
<option value="C" ${cx.tipo==='C'?'selected':''}>Somente Cartão</option>
</select>`}
${cx.tipo==='D'?`<input type="number" placeholder="Troco" value="${cx.troco||''}" onchange="ST.caixas[${i}].troco=parseFloat(this.value)||0;salvarLocal()">`:'<span></span>'}
<input placeholder="Operador" value="${cx.nome||''}" onchange="ST.caixas[${i}].nome=this.value;salvarLocal()">
</div>`;
}).join('');
}

function renderGrade(){
let html='';
ST.caixas.forEach((cx,i)=>{
if(i===VOLANTE_START)html+=`<div style="grid-column:1/-1;font-weight:bold;color:#6d28d9;margin-top:8px">Caixas Volantes 25-40</div>`;
html+=`<button class="cxbtn ${cx.dados?'ok':''} ${atv===i?'on':''} ${cx.tipo==='V'?'vol':''}" onclick="abrirCx(${i})">
${cx.tipo==='V'?'CV':'CX'} ${cx.num}<br>
<small>${cx.tipo==='D'?'💵+💳':cx.tipo==='C'?'💳':'🟣💳'}</small>
</button>`;
});
document.getElementById('grade').innerHTML=html;
}

function abrirCx(i){
atv=i;
renderGrade();
const cx=ST.caixas[i];
const d=cx.dados||{};
const isD=cx.tipo==='D';
const isV=cx.tipo==='V';

document.getElementById('form-cx').innerHTML=`
<div class="card">
<div class="titulo">${isV?'Caixa Volante':'Caixa'} ${cx.num} ${cx.nome?'— '+cx.nome:''}</div>

<div class="zona" onclick="foto(${i})">📷 Fotografar filipeta</div>

<div class="sub">Dados da filipeta</div>
${isD?campo('Dinheiro sistema','f-din',d.din):''}
${campo('Débito','f-deb',d.deb)}
${campo('Crédito','f-cred',d.cred)}
${campo('PIX sistema','f-pix',d.pix)}
${!isV?campo('Liberação de TAG','f-tag',d.tag):''}
${campo('Total filipeta','f-total-filipeta',d.totalFilipeta)}

<div class="sub">Lançamentos manuais</div>
${campo('PIX manual','f-pix-manual',d.pixManual)}
${campo('Ajuste / desconto manual','f-ajuste',d.ajuste)}

<div class="sub">Devoluções</div>
${campo('TAG devolvida em R$','f-devtag',d.devtag)}
${campo('Resgate de saldo','f-devsaldo',d.devsaldo)}
${campo('TAGs liberadas unidades','f-tags-lib',d.tagsLib)}

${isD?`
<div class="sub">Dinheiro físico</div>
${campo('Troco inicial','f-troco',d.trocoInicial??cx.troco)}
${campo('Sangria 1','f-s1',d.s1)}
${campo('Sangria 2','f-s2',d.s2)}
${campo('Sangria 3','f-s3',d.s3)}
${campo('Sangria 4','f-s4',d.s4)}
${campo('Sangria 5','f-s5',d.s5)}
${campo('Reposição 1','f-r1',d.r1)}
${campo('Reposição 2','f-r2',d.r2)}
${campo('Reposição 3','f-r3',d.r3)}
<div class="lf"><label>Contagem física</label><input class="fisico" type="number" id="f-fisico" value="${d.fisico??''}" oninput="calc()"></div>
`:''}

<div id="resultado"></div>
<button class="btn" onclick="salvar(${i})">Salvar Caixa</button>
</div>`;
calc();
}

function campo(label,id,val){
return `<div class="lf"><label>${label}</label><input type="number" id="${id}" value="${val??''}" oninput="calc()"></div>`;
}

function calc(){
if(atv===null)return;
const cx=ST.caixas[atv];
const t=calcAtual(cx);
document.getElementById('resultado').innerHTML=`
<div class="result">
<div class="linha"><span>Cartões + PIX</span><b>${fmt(t.cartoes)}</b></div>
<div class="linha"><span>Dinheiro líquido</span><b>${fmt(t.dinLiquido)}</b></div>
<div class="linha"><span>Total apurado</span><b class="total">${fmt(t.totalComprovado)}</b></div>
<div class="linha"><span>Total filipeta</span><b>${fmt(nv('f-total-filipeta'))}</b></div>
<div class="linha"><span>Diferença geral</span><b class="${t.difGeral>=0?'verde':'vermelho'}">${fmt(t.difGeral)}</b></div>
${cx.tipo==='D'?`<div class="linha"><span>Diferença dinheiro</span><b class="${t.difDin>=0?'verde':'vermelho'}">${fmt(t.difDin)}</b></div>`:''}
</div>`;
}

function calcAtual(cx){
const deb=nv('f-deb'),cred=nv('f-cred'),pix=nv('f-pix'),pixManual=nv('f-pix-manual'),ajuste=nv('f-ajuste'),totalFilipeta=nv('f-total-filipeta');
const cartoes=deb+cred+pix+pixManual;
let dinLiquido=0,difDin=0;
if(cx.tipo==='D'){
const din=nv('f-din'),troco=nv('f-troco'),fisico=nv('f-fisico');
const sang=nv('f-s1')+nv('f-s2')+nv('f-s3')+nv('f-s4')+nv('f-s5');
const repos=nv('f-r1')+nv('f-r2')+nv('f-r3');
dinLiquido=fisico-troco+sang-repos;
difDin=dinLiquido-din;
}
const totalComprovado=dinLiquido+cartoes-ajuste;
const difGeral=totalComprovado-totalFilipeta;
return{cartoes,dinLiquido,totalComprovado,difGeral,difDin};
}

function calcTot(cx){
if(!cx.dados)return{cartoes:0,dinLiquido:0,totalComprovado:0,difGeral:0,difDin:0};
const d=cx.dados;
const cartoes=(d.deb||0)+(d.cred||0)+(d.pix||0)+(d.pixManual||0);
let dinLiquido=0,difDin=0;
if(cx.tipo==='D'){
const sang=(d.s1||0)+(d.s2||0)+(d.s3||0)+(d.s4||0)+(d.s5||0);
const repos=(d.r1||0)+(d.r2||0)+(d.r3||0);
dinLiquido=(d.fisico||0)-(d.trocoInicial||0)+sang-repos;
difDin=dinLiquido-(d.din||0);
}
const totalComprovado=dinLiquido+cartoes-(d.ajuste||0);
const difGeral=totalComprovado-(d.totalFilipeta||0);
return{cartoes,dinLiquido,totalComprovado,difGeral,difDin};
}

function salvar(i){
const cx=ST.caixas[i];
const isD=cx.tipo==='D';
cx.dados={
deb:nv('f-deb'),
cred:nv('f-cred'),
pix:nv('f-pix'),
pixManual:nv('f-pix-manual'),
ajuste:nv('f-ajuste'),
tag:nv('f-tag'),
devtag:nv('f-devtag'),
devsaldo:nv('f-devsaldo'),
tagsLib:nv('f-tags-lib'),
totalFilipeta:nv('f-total-filipeta'),
...(isD?{
din:nv('f-din'),
trocoInicial:nv('f-troco'),
s1:nv('f-s1'),s2:nv('f-s2'),s3:nv('f-s3'),s4:nv('f-s4'),s5:nv('f-s5'),
r1:nv('f-r1'),r2:nv('f-r2'),r3:nv('f-r3'),
fisico:nv('f-fisico')
}:{})
};
salvarLocal();
renderGrade();
const prox=ST.caixas.findIndex((c,j)=>j>i&&!c.dados);
if(prox>=0)abrirCx(prox);
else document.getElementById('form-cx').innerHTML='<div class="card">Todos os caixas lançados. Vá para Consolidado.</div>';
}

function renderCons(){
const lc=ST.caixas.filter(c=>c.dados);
let tot={deb:0,cred:0,pix:0,din:0,apur:0,fil:0,dif:0,dev:0,tag:0};
lc.forEach(cx=>{
const d=cx.dados,t=calcTot(cx);
tot.deb+=d.deb||0;
tot.cred+=d.cred||0;
tot.pix+=(d.pix||0)+(d.pixManual||0);
tot.din+=t.dinLiquido;
tot.apur+=t.totalComprovado;
tot.fil+=d.totalFilipeta||0;
tot.dif+=t.difGeral;
tot.dev+=(d.devtag||0)+(d.devsaldo||0);
tot.tag+=d.tagsLib||0;
});

document.getElementById('cards').innerHTML=`
${card('Total Apurado',fmt(tot.apur),'verde')}
${card('Total Filipeta',fmt(tot.fil),'')}
${card('Diferença Geral',fmt(tot.dif),tot.dif>=0?'verde':'vermelho')}
${card('Débito',fmt(tot.deb),'')}
${card('Crédito',fmt(tot.cred),'')}
${card('PIX',fmt(tot.pix),'')}
${card('Dinheiro',fmt(tot.din),'verde')}
${card('Devoluções',fmt(tot.dev),'vermelho')}
${card('TAGs Liberadas',tot.tag+' un','')}
`;

const rows=ST.caixas.map(cx=>{
const d=cx.dados,t=calcTot(cx);
return `<tr>
<td>${cx.tipo==='V'?'CV':'CX'} ${cx.num}</td>
<td>${cx.nome||''}</td>
<td>${d?fmt(d.deb||0):'—'}</td>
<td>${d?fmt(d.cred||0):'—'}</td>
<td>${d?fmt((d.pix||0)+(d.pixManual||0)):'—'}</td>
<td>${d?fmt(t.dinLiquido):'—'}</td>
<td>${d?fmt(t.totalComprovado):'—'}</td>
<td class="${d&&t.difGeral>=0?'verde':'vermelho'}">${d?fmt(t.difGeral):'—'}</td>
<td>${d?fmt((d.devtag||0)+(d.devsaldo||0)):'—'}</td>
<td>${d?(d.tagsLib||0)+' un':'—'}</td>
</tr>`;
}).join('');

document.getElementById('tbl').innerHTML=`
<thead><tr>
<th>Caixa</th><th>Operador</th><th>Débito</th><th>Crédito</th><th>PIX</th><th>Dinheiro</th><th>Apurado</th><th>Dif.</th><th>Devol.</th><th>TAGs</th>
</tr></thead><tbody>${rows}</tbody>`;
}

function card(lb,vl,cls){
return `<div class="mcard"><div class="lb">${lb}</div><div class="vl ${cls}">${vl}</div></div>`;
}

function foto(idx){
const fi=document.getElementById('fi');
fi.onchange=e=>{
const f=e.target.files[0];
if(!f)return;
procFoto(f,idx);
fi.value='';
};
fi.click();
}

async function procFoto(file,idx){
alert('Foto recebida. A leitura OCR depende do seu servidor /api/ocr estar funcionando.');
}

function expCSV(){
const ev=document.getElementById('inp-evento').value||'Evento';
const dt=document.getElementById('inp-data').value||'';
let c='Caixa,Operador,Tipo,Débito,Crédito,PIX,Dinheiro,Total Apurado,Total Filipeta,Diferença,Devoluções,TAGs\n';
ST.caixas.forEach(cx=>{
if(!cx.dados)return;
const d=cx.dados,t=calcTot(cx);
c+=`${cx.num},${cx.nome||''},${cx.tipo},${d.deb||0},${d.cred||0},${(d.pix||0)+(d.pixManual||0)},${t.dinLiquido},${t.totalComprovado},${d.totalFilipeta||0},${t.difGeral},${(d.devtag||0)+(d.devsaldo||0)},${d.tagsLib||0}\n`;
});
const a=document.createElement('a');
a.href=URL.createObjectURL(new Blob([c],{type:'text/csv'}));
a.download=`Fechamento_${ev}_${dt}.csv`.replace(/\s+/g,'_');
a.click();
}

async function expXLSX(){
if(typeof ExcelJS==='undefined'){alert('Aguarde a biblioteca carregar.');return;}

const ev=document.getElementById('inp-evento').value||'Evento';
const dt=document.getElementById('inp-data').value||'';

const wb=new ExcelJS.Workbook();
wb.creator='Fechamento de Caixa';
wb.created=new Date();

const moneyFmt='R$ #,##0.00;[Red]-R$ #,##0.00';
const border={
top:{style:'thin',color:{argb:'FFD0D0D0'}},
left:{style:'thin',color:{argb:'FFD0D0D0'}},
bottom:{style:'thin',color:{argb:'FFD0D0D0'}},
right:{style:'thin',color:{argb:'FFD0D0D0'}}
};
const fill=argb=>({type:'pattern',pattern:'solid',fgColor:{argb}});
const font=(bold=false,color='FF1A1A1A',size=10)=>({name:'Calibri',bold,color:{argb:color},size});
const align=(horizontal='center',wrap=false)=>({horizontal,vertical:'middle',wrapText:wrap});

function config(ws,ySplit=3){
ws.views=[{showGridLines:true,showRowColHeaders:true,state:'frozen',ySplit}];
ws.pageSetup={
paperSize:9,
orientation:'landscape',
fitToPage:true,
fitToWidth:1,
fitToHeight:0,
margins:{left:0.25,right:0.25,top:0.35,bottom:0.35,header:0.2,footer:0.2}
};
}

function titulo(ws,text,lastCol){
ws.mergeCells(1,1,1,lastCol);
const c=ws.getCell(1,1);
c.value=text;
c.fill=fill('FF1A3A5C');
c.font=font(true,'FFFFFFFF',15);
c.alignment=align('center',true);
c.border=border;
ws.getRow(1).height=30;
}

function cabecalho(row){
row.eachCell(cell=>{
cell.fill=fill('FF1565C0');
cell.font=font(true,'FFFFFFFF',10);
cell.alignment=align('center',true);
cell.border=border;
});
}

function corpo(row){
row.eachCell((cell,col)=>{
cell.border=border;
cell.alignment=align(col<=3?'center':'right',true);
cell.fill=fill(row.number%2===0?'FFF8FAFC':'FFFFFFFF');
if(typeof cell.value==='number'&&col>=4)cell.numFmt=moneyFmt;
if(col===12&&typeof cell.value==='number'){
cell.font=font(true,cell.value>=0?'FF2E7D32':'FFC62828',10);
cell.fill=fill(cell.value>=0?'FFE8F5E9':'FFFFEBEE');
}
});
}

const ativos=ST.caixas.filter(cx=>cx.dados);

let total={
deb:0,cred:0,pix:0,pixm:0,ajuste:0,din:0,apur:0,fil:0,dif:0,tag:0,devtag:0,resgate:0
};

const ws=wb.addWorksheet('Fechamento');
config(ws,3);

ws.columns=[
{header:'Caixa',width:12},
{header:'Operador',width:26},
{header:'Tipo',width:18},
{header:'Débito',width:15},
{header:'Crédito',width:15},
{header:'PIX',width:15},
{header:'PIX Manual',width:15},
{header:'Ajuste',width:15},
{header:'Dinheiro Líquido',width:18},
{header:'Total Apurado',width:18},
{header:'Total Filipeta',width:18},
{header:'Diferença Geral',width:18},
{header:'TAGs Lib.',width:14},
{header:'TAG Devolvida',width:16},
{header:'Resgate Saldo',width:16}
];

titulo(ws,`FECHAMENTO DE CAIXA — ${ev} — ${dt}`,15);
ws.addRow([]);
ws.addRow(ws.columns.map(c=>c.header));
cabecalho(ws.getRow(3));

ativos.forEach(cx=>{
const d=cx.dados;
const t=calcTot(cx);
const row=ws.addRow([
cx.tipo==='V'?`CV ${cx.num}`:`CX ${cx.num}`,
cx.nome||'',
cx.tipo==='V'?'Volante':cx.tipo==='D'?'Dinheiro + Cartão':'Cartão',
d.deb||0,
d.cred||0,
d.pix||0,
d.pixManual||0,
d.ajuste||0,
cx.tipo==='D'?t.dinLiquido:0,
t.totalComprovado,
d.totalFilipeta||0,
t.difGeral,
d.tagsLib||0,
d.devtag||0,
d.devsaldo||0
]);
corpo(row);

total.deb+=d.deb||0;
total.cred+=d.cred||0;
total.pix+=d.pix||0;
total.pixm+=d.pixManual||0;
total.ajuste+=d.ajuste||0;
total.din+=cx.tipo==='D'?t.dinLiquido:0;
total.apur+=t.totalComprovado;
total.fil+=d.totalFilipeta||0;
total.dif+=t.difGeral;
total.tag+=d.tagsLib||0;
total.devtag+=d.devtag||0;
total.resgate+=d.devsaldo||0;
});

ws.addRow([]);
const totalRow=ws.addRow([
'TOTAL','','',
total.deb,total.cred,total.pix,total.pixm,total.ajuste,total.din,total.apur,total.fil,total.dif,total.tag,total.devtag,total.resgate
]);
totalRow.eachCell((cell,col)=>{
cell.fill=fill('FFE3F2FD');
cell.font=font(true,col===12?(total.dif>=0?'FF2E7D32':'FFC62828'):'FF1A3A5C',11);
cell.alignment=align(col<=3?'center':'right',true);
cell.border=border;
if(typeof cell.value==='number'&&col>=4)cell.numFmt=moneyFmt;
});

const dash=wb.addWorksheet('Dashboard');
config(dash,13);
[4,20,22,18,18,18,18].forEach((w,i)=>dash.getColumn(i+1).width=w);
titulo(dash,`DASHBOARD — ${ev} — ${dt}`,7);

const cards=[
['Total Apurado',total.apur,'FFE8F5E9','FF2E7D32'],
['Total Filipeta',total.fil,'FFE3F2FD','FF1565C0'],
['Diferença Geral',total.dif,total.dif>=0?'FFE8F5E9':'FFFFEBEE',total.dif>=0?'FF2E7D32':'FFC62828'],
['Débito',total.deb,'FFE3F2FD','FF1565C0'],
['Crédito',total.cred,'FFE3F2FD','FF1565C0'],
['PIX Total',total.pix+total.pixm,'FFE0F2F1','FF00796B'],
['Dinheiro Líquido',total.din,'FFE8F5E9','FF2E7D32'],
['TAGs Liberadas',total.tag,'FFFFFDE7','FFF9A825'],
['Devoluções',total.devtag+total.resgate,'FFFFEBEE','FFC62828']
];

let cr=3;
cards.forEach((it,i)=>{
const col=2+(i%3)*2;
if(i>0&&i%3===0)cr+=3;
dash.mergeCells(cr,col,cr,col+1);
dash.getCell(cr,col).value=it[0];
dash.getCell(cr,col).fill=fill('FF1A3A5C');
dash.getCell(cr,col).font=font(true,'FFFFFFFF',9);
dash.getCell(cr,col).alignment=align('center',true);
dash.getCell(cr,col).border=border;

dash.mergeCells(cr+1,col,cr+1,col+1);
dash.getCell(cr+1,col).value=it[1];
dash.getCell(cr+1,col).fill=fill(it[2]);
dash.getCell(cr+1,col).font=font(true,it[3],14);
dash.getCell(cr+1,col).alignment=align('center',true);
dash.getCell(cr+1,col).border=border;
dash.getCell(cr+1,col).numFmt=i===7?'0':'R$ #,##0.00;[Red]-R$ #,##0.00';
});

const start=13;
['Caixa','Operador','Total Apurado','Total Filipeta','Diferença Geral','TAGs Lib.'].forEach((h,i)=>{
const c=dash.getCell(start,i+2);
c.value=h;
c.fill=fill('FF1565C0');
c.font=font(true,'FFFFFFFF',10);
c.alignment=align('center',true);
c.border=border;
});

let rd=start+1;
ativos.forEach(cx=>{
const d=cx.dados;
const t=calcTot(cx);
[
cx.tipo==='V'?`CV ${cx.num}`:`CX ${cx.num}`,
cx.nome||'',
t.totalComprovado,
d.totalFilipeta||0,
t.difGeral,
d.tagsLib||0
].forEach((v,i)=>{
const c=dash.getCell(rd,i+2);
c.value=v;
c.border=border;
c.alignment=align(i<2?'center':'right',true);
c.fill=fill(rd%2===0?'FFF8FAFC':'FFFFFFFF');
if(i>=2&&i<=4)c.numFmt=moneyFmt;
if(i===4){
c.font=font(true,v>=0?'FF2E7D32':'FFC62828',10);
c.fill=fill(v>=0?'FFE8F5E9':'FFFFEBEE');
}
});
rd++;
});

const din=wb.addWorksheet('Detalhamento Dinheiro');
config(din,3);
[10,24,16,14,12,12,12,12,12,12,12,12,18,16,18,18].forEach((w,i)=>din.getColumn(i+1).width=w);
titulo(din,`DETALHAMENTO DINHEIRO — ${ev} — ${dt}`,16);
din.addRow([]);
din.addRow(['CX','Operador','Din. Sistema','Troco','S1','S2','S3','S4','S5','R1','R2','R3','Din. Esperado','Físico','Din. Líquido','Dif. Dinheiro']);
cabecalho(din.getRow(3));

ST.caixas.filter(cx=>cx.tipo==='D'&&cx.dados).forEach(cx=>{
const d=cx.dados,t=calcTot(cx);
const sang=(d.s1||0)+(d.s2||0)+(d.s3||0)+(d.s4||0)+(d.s5||0);
const repos=(d.r1||0)+(d.r2||0)+(d.r3||0);
const esp=(d.din||0)-(d.trocoInicial||0)+sang-repos;

const row=din.addRow([
`CX ${cx.num}`,cx.nome||'',d.din||0,d.trocoInicial||0,
d.s1||0,d.s2||0,d.s3||0,d.s4||0,d.s5||0,
d.r1||0,d.r2||0,d.r3||0,
esp,d.fisico||0,t.dinLiquido,t.difDin
]);

row.eachCell((cell,col)=>{
cell.border=border;
cell.alignment=align(col<=2?'center':'right',true);
cell.fill=fill(row.number%2===0?'FFF8FAFC':'FFFFFFFF');
if(typeof cell.value==='number'&&col>=3)cell.numFmt=moneyFmt;
if(col===16&&typeof cell.value==='number'){
cell.font=font(true,cell.value>=0?'FF2E7D32':'FFC62828',10);
cell.fill=fill(cell.value>=0?'FFE8F5E9':'FFFFEBEE');
}
});
});

const buf=await wb.xlsx.writeBuffer();
const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
const url=URL.createObjectURL(blob);
const a=document.createElement('a');
a.href=url;
a.download=`Fechamento_${ev}_${dt}.xlsx`.replace(/\s+/g,'_');
a.click();
URL.revokeObjectURL(url);
}

function bulkTipo(tipo){
ST.caixas.slice(0,VOLANTE_START).forEach(cx=>cx.tipo=tipo);
renderCfg();
salvarLocal();
}

const TROCO_CX=[0,7,8,9,10,11,12,19,20];

function bulkTroco(){
const v=parseFloat(document.getElementById('inp-bulk-troco').value)||0;
TROCO_CX.forEach(i=>ST.caixas[i].troco=v);
renderCfg();
salvarLocal();
}

function novoEvento(){
if(!confirm('Apagar todos os dados?'))return;
ST.caixas.forEach(cx=>cx.dados=null);
atv=null;
document.getElementById('inp-data').value='';
document.getElementById('inp-evento').value='';
localStorage.removeItem(LS_KEY);
renderCfg();
renderGrade();
aba('config');
}

restaurarLocal();
renderCfg();
renderGrade();
document.getElementById('inp-data').addEventListener('change',salvarLocal);
document.getElementById('inp-evento').addEventListener('change',salvarLocal);
</script>
</body>
</html>
