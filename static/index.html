<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Fechamento Caixa">
<title>Fechamento de Caixa</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--cf:#1a3a5c;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;min-height:100vh;font-size:16px;}
.topo{background:var(--cf);color:#fff;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topo h1{font-size:19px;font-weight:600;}
.topo-meta{display:flex;gap:8px;}
.topo input{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:8px;padding:8px 11px;color:#fff;font-size:14px;}
.topo input::placeholder{color:rgba(255,255,255,.6);}
.nav{display:flex;background:#fff;border-bottom:1px solid #e0e0e0;position:sticky;top:57px;z-index:99;}
.nav button{flex:1;padding:15px 6px;font-size:15px;border:none;background:none;color:#666;border-bottom:3px solid transparent;cursor:pointer;font-weight:500;}
.nav button.on{color:var(--cf);border-bottom-color:var(--cf);}
.pnl{display:none;padding:16px;max-width:600px;margin:0 auto;}
.pnl.on{display:block;}
.card{background:#fff;border-radius:12px;padding:18px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.grade{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:16px;}
.bcx{padding:12px 2px;border:1px solid #ddd;border-radius:8px;font-size:13px;cursor:pointer;background:#fff;text-align:center;line-height:1.5;}
.bcx.ok{background:#e8f5e9;border-color:#4caf50;color:#2e7d32;}
.bcx.on{border:2px solid var(--cf);font-weight:700;}
.bcx .sub{font-size:11px;color:#999;}
.bcx.ok .sub{color:#4caf50;}
.ftit{font-size:17px;font-weight:600;color:#1a1a1a;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center;}
.badge{font-size:12px;padding:4px 12px;border-radius:20px;font-weight:500;}
.bd{background:#e3f2fd;color:#1565c0;}.bc{background:#f3e5f5;color:#6a1b9a;}
.slbl{font-size:12px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.6px;margin:14px 0 9px;}
.slbl.azul{color:#1565c0;}.slbl.verde{color:#2e7d32;}.slbl.vermelho{color:#c62828;}.slbl.laranja{color:#e65100;}
.lf{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.lf label{font-size:16px;color:#555;flex:1;}
.lf input{width:140px;padding:13px 12px;border:1px solid #ddd;border-radius:8px;font-size:20px;text-align:right;background:#fff;font-weight:600;}
.lf input.vrd{border-color:#4caf50;background:#f9fff9;}
.lf input:focus{outline:none;border-color:var(--cf);}
hr{border:none;border-top:1px solid #f0f0f0;margin:14px 0;}
.lt{display:flex;justify-content:space-between;align-items:center;padding:9px 0;}
.lt .lb{font-size:16px;color:#666;}.lt .vl{font-size:24px;font-weight:700;color:#1a1a1a;}
.ok-c{color:#2e7d32!important;}.err-c{color:#c62828!important;}.warn-c{color:#e65100!important;}
.btn-p{width:100%;padding:17px;background:var(--cf);color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:600;cursor:pointer;margin-top:14px;}
.btn-p:active{opacity:.85;}
.zona{border:2px dashed #ccc;border-radius:12px;padding:28px 20px;text-align:center;cursor:pointer;margin-bottom:14px;background:#fafafa;}
.zona.proc{border-color:#1976d2;background:#f0f7ff;}
.zona.suc{border-color:#4caf50;background:#f0fff4;}
.zona.err{border-color:#e53935;background:#fff5f5;}
.zona-ic{font-size:42px;margin-bottom:8px;}
.zona-lb{font-size:16px;color:#555;font-weight:500;}
.zona-sub{font-size:13px;color:#999;margin-top:5px;}
.spin{display:inline-block;width:20px;height:20px;border:2px solid #bbdefb;border-top-color:#1976d2;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes sp{to{transform:rotate(360deg);}}
.stbox{font-size:14px;padding:12px 15px;border-radius:8px;margin-bottom:12px;display:none;line-height:1.6;}
.stbox.l{background:#e3f2fd;color:#1565c0;}.stbox.s{background:#e8f5e9;color:#2e7d32;}.stbox.e{background:#ffebee;color:#c62828;}
.bloco{background:#f8f9fa;border-radius:12px;padding:14px;margin-top:10px;}
.bloco .titulo{font-size:12px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;}
.destaque{border-radius:10px;padding:12px 14px;margin-top:8px;}
.destaque.azul{background:#e3f2fd;}.destaque.verde{background:#e8f5e9;}.destaque.vermelho{background:#ffebee;}.destaque.laranja{background:#fff3e0;}
.destaque .dl{font-size:14px;color:#555;}.destaque .dv{font-size:26px;font-weight:800;}
.mcard{background:#f8f9fa;border-radius:10px;padding:14px;}
.mcard .lb{font-size:14px;color:#888;margin-bottom:4px;}
.mcard .vl{font-size:22px;font-weight:700;color:#1a1a1a;}
.mcard.tag-s{background:#fff8e1;border:2px solid #f59e0b;}
.mcard.tag-s .lb{color:#b45309;}.mcard.tag-s .vl{color:#92400e;}
.tag-sc{background:#fff8e1;color:#92400e;font-weight:700;}
.tbl{width:100%;border-collapse:collapse;font-size:13px;}
.tbl th{text-align:left;font-weight:600;font-size:11px;color:#888;padding:8px;border-bottom:1px solid #eee;white-space:nowrap;}
.tbl td{padding:9px 8px;border-bottom:1px solid #f5f5f5;color:#1a1a1a;}
.tbl .n{text-align:right;}
.tbl tfoot td{font-weight:700;border-top:2px solid #eee;padding-top:10px;}
.dok{color:#2e7d32;font-weight:700;}.derr{color:#c62828;font-weight:700;}
.cfg-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid #f5f5f5;flex-wrap:wrap;}
.cfg-row .cn{font-size:15px;font-weight:700;min-width:56px;color:#1a1a1a;}
.cfg-row select,.cfg-row input{padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:15px;background:#fff;}
.info{background:#f0f4ff;border-radius:10px;padding:13px 16px;font-size:14px;color:#1565c0;line-height:1.7;margin-bottom:14px;}
.btn-sec{padding:13px 20px;border:1px solid #ddd;border-radius:10px;font-size:15px;cursor:pointer;background:#fff;color:#333;font-weight:500;}
.btn-xlsx{padding:13px 20px;border:none;border-radius:10px;font-size:15px;cursor:pointer;background:#1a5c2e;color:#fff;font-weight:600;}
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:999;align-items:center;justify-content:center;padding:20px;}
#ov.show{display:flex;}
.ov-box{background:#fff;border-radius:20px;width:100%;max-width:480px;padding:28px 24px;text-align:center;max-height:90vh;overflow-y:auto;}
.ov-tit{font-size:22px;font-weight:700;color:var(--cf);margin-bottom:6px;}
.ov-sub{font-size:15px;color:#888;margin-bottom:22px;}
.ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:22px;}
.ov-item{background:#f4f6fa;border-radius:14px;padding:14px 10px;}
.ov-item.full{grid-column:1/-1;}.ov-item.tot{background:var(--cf);}
.ov-item.verde{background:#e8f5e9;}.ov-item.vermelho{background:#ffebee;}.ov-item.laranja{background:#fff3e0;}
.ov-lbl{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
.ov-item.tot .ov-lbl{color:rgba(255,255,255,.75);}
.ov-item.verde .ov-lbl{color:#2e7d32;}
.ov-val{font-size:24px;font-weight:800;color:#1a1a1a;line-height:1.1;}
.ov-item.tot .ov-val{color:#fff;font-size:28px;}
.ov-item.vermelho .ov-val{color:#c62828;}.ov-item.verde .ov-val{color:#2e7d32;}.ov-item.laranja .ov-val{color:#e65100;}
.ov-btn{width:100%;padding:18px;background:var(--cf);color:#fff;border:none;border-radius:12px;font-size:18px;font-weight:700;cursor:pointer;}
#barra{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--cf);z-index:200;padding:10px 18px 14px;box-shadow:0 -3px 12px rgba(0,0,0,.18);}
#barra.show{display:block;}
.bar-row{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.bar-item{text-align:center;flex:1;}
.bar-lbl{font-size:11px;font-weight:600;color:rgba(255,255,255,.65);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;}
.bar-val{font-size:18px;font-weight:800;color:#fff;line-height:1.1;}
.bar-item.tot .bar-val{font-size:22px;color:#ffe082;}
.bar-prog{height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin-top:8px;overflow:hidden;}
.bar-prog-fill{height:100%;background:#ffe082;border-radius:2px;transition:width .4s ease;}
#pnl-lancamento{padding-bottom:90px;}
@media print{
  @page{size:A4 landscape;margin:12mm 10mm;}
  body{background:#fff!important;}
  .topo,.nav,#pnl-config,#pnl-lancamento,#barra,#ov,.btn-sec,.btn-xlsx,.btn-print,#fi{display:none!important;}
  #pnl-consolidado{display:block!important;padding:0;max-width:100%;}
  #print-hdr{display:block!important;}
  .card{box-shadow:none!important;border:1px solid #ddd;}
  .tbl{font-size:11px!important;}
  .tbl th,.tbl td{padding:5px 6px!important;}
  .dok{color:#2e7d32!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .derr{color:#c62828!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
}
#print-hdr{display:none;margin-bottom:14px;}
#print-hdr h2{font-size:18px;font-weight:700;color:#1a3a5c;margin-bottom:10px;}
</style>
</head>
<body>
<div class="topo">
  <h1>📋 Fechamento de Caixa</h1>
  <div class="topo-meta">
    <input type="text" id="inp-data" placeholder="Data" style="width:80px;">
    <input type="text" id="inp-evento" placeholder="Evento" style="width:130px;">
  </div>
</div>
<div class="nav">
  <button class="on" onclick="aba('config')">⚙️ Config</button>
  <button onclick="aba('lancamento')">📷 Lançamento</button>
  <button onclick="aba('consolidado')">📊 Consolidado</button>
</div>
<div id="pnl-config" class="pnl on">
  <div class="info">Configure o tipo e troco inicial de cada caixa antes de começar.</div>
  <div style="display:flex;gap:8px;margin-bottom:10px;">
    <button onclick="bulkTipo('D')" style="flex:1;padding:12px;border:2px solid #1565c0;border-radius:10px;background:#e3f2fd;color:#1565c0;font-size:14px;font-weight:700;cursor:pointer;">💵 Todos Dinheiro</button>
    <button onclick="bulkTipo('C')" style="flex:1;padding:12px;border:2px solid #6a1b9a;border-radius:10px;background:#f3e5f5;color:#6a1b9a;font-size:14px;font-weight:700;cursor:pointer;">💳 Todos Cartão</button>
  </div>
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;background:#fff;border-radius:10px;padding:12px 14px;box-shadow:0 1px 3px rgba(0,0,0,.08);">
    <span style="font-size:14px;font-weight:600;color:#555;flex:1;">💰 Troco padrão (CX 1,8–13,20,21)</span>
    <input type="number" id="inp-bulk-troco" placeholder="Ex: 250" style="width:110px;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:16px;text-align:right;">
    <button onclick="bulkTroco()" style="padding:10px 16px;background:var(--cf);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;">Aplicar</button>
  </div>
  <div class="card" id="lista-cfg"></div>
  <button class="btn-p" onclick="aba('lancamento')">Confirmar e ir para lançamento →</button>
  <button onclick="novoEvento()" style="width:100%;padding:15px;margin-top:10px;background:none;border:2px solid #c62828;border-radius:12px;color:#c62828;font-size:16px;font-weight:700;cursor:pointer;">🗑️ Novo evento</button>
</div>
<div id="pnl-lancamento" class="pnl">
  <div class="grade" id="grade"></div>
  <div id="form-cx"><p style="font-size:13px;color:#888;text-align:center;padding:20px 0;">Selecione um caixa acima</p></div>
</div>
<div id="pnl-consolidado" class="pnl">
  <div id="print-hdr"><h2 id="print-title">Fechamento de Caixa</h2></div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:14px;" id="cards"></div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
    <span style="font-size:13px;font-weight:700;color:#1a1a1a;">Por caixa</span>
    <div style="display:flex;gap:7px;">
      <button class="btn-sec" onclick="expCSV()">CSV</button>
      <button class="btn-xlsx" onclick="expXLSX()">📥 XLSX</button>
      <button onclick="window.print()" style="padding:13px 20px;border:none;border-radius:10px;font-size:15px;cursor:pointer;background:#374151;color:#fff;font-weight:600;">🖨️ Imprimir</button>
    </div>
  </div>
  <div class="card" style="overflow-x:auto;padding:0;">
    <table class="tbl" id="tbl"></table>
  </div>
</div>
<input type="file" id="fi" accept="image/*" capture="environment" style="display:none;">
<div id="barra">
  <div class="bar-row">
    <div class="bar-item"><div class="bar-lbl">Débito</div><div class="bar-val" id="b-deb">R$ 0,00</div></div>
    <div class="bar-item"><div class="bar-lbl">Crédito</div><div class="bar-val" id="b-cred">R$ 0,00</div></div>
    <div class="bar-item"><div class="bar-lbl">PIX</div><div class="bar-val" id="b-pix">R$ 0,00</div></div>
    <div class="bar-item tot"><div class="bar-lbl">Total acumulado</div><div class="bar-val" id="b-tot">R$ 0,00</div></div>
    <div class="bar-item" style="flex:0 0 auto;background:rgba(255,255,255,.15);border-radius:10px;padding:8px 12px;min-width:52px;">
      <div class="bar-lbl">CX</div>
      <div class="bar-val" id="b-cnt" style="font-size:20px;">0/24</div>
    </div>
  </div>
  <div class="bar-prog"><div class="bar-prog-fill" id="b-prog" style="width:0%"></div></div>
</div>
<div id="ov">
  <div class="ov-box">
    <div class="ov-tit" id="ov-tit"></div>
    <div class="ov-sub" id="ov-sub"></div>
    <div class="ov-grid" id="ov-grid"></div>
    <button class="ov-btn" onclick="fecharOv()">✓ Confirmar e continuar</button>
  </div>
</div>
<script>
const ST={caixas:Array.from({length:24},(_,i)=>({num:i+1,tipo:'D',troco:0,nome:'',dados:null}))};
let atv=null;
const fmt=v=>'R$ '+Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const n=id=>parseFloat(document.getElementById(id)?.value)||0;
const LS_KEY='fechamento_v4';
function salvarLocal(){try{localStorage.setItem(LS_KEY,JSON.stringify({caixas:ST.caixas,data:document.getElementById('inp-data').value,evento:document.getElementById('inp-evento').value}));}catch(e){}}
function restaurarLocal(){try{const raw=localStorage.getItem(LS_KEY);if(!raw)return;const s=JSON.parse(raw);if(s.caixas&&s.caixas.length===24){s.caixas.forEach((c,i)=>{Object.assign(ST.caixas[i],c);});if(s.data)document.getElementById('inp-data').value=s.data;if(s.evento)document.getElementById('inp-evento').value=s.evento;const lc=ST.caixas.filter(c=>c.dados).length;if(lc>0)mostrarToast(`✅ Sessão restaurada — ${lc} caixas recuperados`);}}catch(e){}}
function mostrarToast(msg){const t=document.createElement('div');t.textContent=msg;t.style.cssText='position:fixed;top:70px;left:50%;transform:translateX(-50%);background:#1a3a5c;color:#fff;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600;z-index:9999;box-shadow:0 4px 12px rgba(0,0,0,.3);';document.body.appendChild(t);setTimeout(()=>t.remove(),3500);}
function atualizarBarra(){const lc=ST.caixas.filter(c=>c.dados);const count=lc.length;if(count===0){document.getElementById('barra').classList.remove('show');return;}let td=0,tc=0,tp=0,ttot=0;lc.forEach(cx=>{const d=cx.dados,t=calcTot(cx);td+=(d.deb||0);tc+=(d.cred||0);tp+=(d.pix||0)+(d.pixManual||0);ttot+=t.totalComprovado;});document.getElementById('b-deb').textContent=fmt(td);document.getElementById('b-cred').textContent=fmt(tc);document.getElementById('b-pix').textContent=fmt(tp);document.getElementById('b-tot').textContent=fmt(ttot);document.getElementById('b-prog').style.width=(count/24*100)+'%';document.getElementById('b-cnt').textContent=count+'/24';document.getElementById('barra').classList.add('show');}
function aba(id){document.querySelectorAll('.nav button').forEach((b,i)=>b.classList.toggle('on',['config','lancamento','consolidado'][i]===id));document.querySelectorAll('.pnl').forEach(p=>p.classList.remove('on'));document.getElementById('pnl-'+id).classList.add('on');if(id==='lancamento'){renderGrade();atualizarBarra();}if(id==='consolidado'){renderCons();document.getElementById('barra').classList.remove('show');}if(id==='config')document.getElementById('barra').classList.remove('show');}
function renderCfg(){document.getElementById('lista-cfg').innerHTML=ST.caixas.map((cx,i)=>`<div class="cfg-row"><span class="cn">CX ${cx.num}</span><select onchange="ST.caixas[${i}].tipo=this.value;renderCfg()" style="flex:1;min-width:130px;"><option value="D" ${cx.tipo==='D'?'selected':''}>Dinheiro + Cartão</option><option value="C" ${cx.tipo==='C'?'selected':''}>Somente Cartão</option></select>${cx.tipo==='D'?`<input type="number" value="${cx.troco}" placeholder="Troco" onchange="ST.caixas[${i}].troco=parseFloat(this.value)||0" style="width:80px;">`:``}<input type="text" placeholder="Nome do operador" value="${cx.nome}" onchange="ST.caixas[${i}].nome=this.value" style="flex:1;min-width:160px;"></div>`).join('');}
function renderGrade(){document.getElementById('grade').innerHTML=ST.caixas.map((cx,i)=>`<button class="bcx ${cx.dados?'ok':''} ${atv===i?'on':''}" onclick="abrirCx(${i})"><div style="font-weight:600;">CX ${cx.num}</div><div class="sub">${cx.tipo==='D'?'💵':'💳'}</div>${cx.dados?'<div style="font-size:9px;color:#4caf50;">✓</div>':''}</button>`).join('');}
function abrirCx(i){atv=i;renderGrade();const cx=ST.caixas[i],d=cx.dados||{},is=cx.tipo==='D';document.getElementById('form-cx').innerHTML=`<div class="card"><div class="ftit">Caixa ${cx.num}${cx.nome?' — '+cx.nome:''}<span class="badge ${is?'bd':'bc'}">${is?'💵 Dinheiro':'💳 Cartão'}</span></div><div class="zona" id="zona" onclick="foto(${i})"><div class="zona-ic">📷</div><div class="zona-lb">Fotografar filipeta</div><div class="zona-sub">Toque para abrir a câmera</div></div><div class="stbox" id="stocr"></div><div class="slbl azul">📄 Dados da filipeta (sistema Eye)</div>${is?`<div class="lf"><label>Dinheiro (sistema)</label><input type="number" id="f-din" value="${d.din||0}" oninput="calc()"></div>`:''}<div class="lf"><label>Débito</label><input type="number" id="f-deb" value="${d.deb||0}" oninput="calc()"></div><div class="lf"><label>Crédito</label><input type="number" id="f-cred" value="${d.cred||0}" oninput="calc()"></div><div class="lf"><label>PIX (sistema)</label><input type="number" id="f-pix" value="${d.pix||0}" oninput="calc()"></div><div class="lf"><label>Liberação de TAG</label><input type="number" id="f-tag" value="${d.tag||0}" oninput="calc()"></div><div class="lf"><label style="font-weight:700;">Total filipeta</label><input type="number" id="f-total-filipeta" value="${d.totalFilipeta||0}" oninput="calc()" style="border-color:#1a3a5c;font-weight:700;"></div><hr><div class="slbl laranja">📝 Lançamentos manuais</div><div class="lf"><label>PIX manual <span style="font-size:12px;color:#888;">(sistema travado)</span></label><input type="number" id="f-pix-manual" value="${d.pixManual||0}" oninput="calc()" style="border-color:#e65100;"></div>${is?`<div class="lf"><label>Ajuste dinheiro <span style="font-size:12px;color:#888;">(desconto)</span></label><input type="number" id="f-ajuste" value="${d.ajuste||0}" oninput="calc()" style="border-color:#e65100;"></div>`:''}<hr><div class="slbl vermelho">↩️ Devoluções (somente relatório)</div><div class="lf"><label>TAG dev 3||0,d.s4||0,d.s5||0,d.r1||0,d.r2||0,d.r3||0,dinEsp,fisico,t.dinLiquido,t.difDin]);});XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(aoa2),'Detalhamento');XLSX.writeFile(wb,`Fechamento_${ev}_${dt}.xlsx`.replace(/\s+/g,'_'));}
